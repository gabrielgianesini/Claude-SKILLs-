description: "Avaliacao do sistema de Skills — public-skills"

providers:
  - id: google:gemini-2.5-flash
    label: gemini-2.5-flash
    config:
      systemInstruction: file://prompts/system-prompt.txt
      generationConfig:
        maxOutputTokens: 4096
        temperature: 0

defaultEval:
  options:
    provider:
      id: google:gemini-2.5-flash
      config:
        generationConfig:
          maxOutputTokens: 1024
          temperature: 0

prompts:
  - "{{userMessage}}"

defaultTest:
  vars:
    systemPrompt: file://prompts/system-prompt.txt

tests:
  - file://tests/skill-activation.yaml
  - file://tests/pipeline-flow.yaml
  - file://tests/quality-adr.yaml
  - file://tests/quality-tdd.yaml
  - file://tests/quality-readable-code.yaml
  - file://tests/quality-security.yaml
  - file://tests/quality-code-review.yaml
  - file://tests/quality-observability.yaml

outputPath: output/eval-results.json
